# /etc/nginx/sites-available/portfolio
# Symlink: sudo ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name joshiakshit.live www.joshiakshit.live;

    # Certbot will replace this block with HTTPS redirect after running:
    # sudo certbot --nginx -d joshiakshit.live -d www.joshiakshit.live

    root /var/www/portfolio;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache HTML with revalidation
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Logging
    access_log /var/log/nginx/portfolio.access.log;
    error_log  /var/log/nginx/portfolio.error.log;
}
